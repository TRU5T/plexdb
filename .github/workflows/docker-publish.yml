# Build and push Docker image to GitHub Container Registry (GHCR)
# Runs on every push to main. Image: ghcr.io/<repo-owner>/plexdb-merge:latest
#
# If you get "permission_denied: write_package" (e.g. repo in an org with restricted tokens):
# 1. Create a PAT: GitHub → Settings → Developer settings → Personal access tokens →
#    Fine-grained (or Classic) with scope "write:packages". If the repo is in an org with SSO,
#    authorize the token for that org.
# 2. Add repo secret: GHCR_TOKEN = the PAT.
# The workflow uses GHCR_TOKEN when set, otherwise GITHUB_TOKEN.

name: Publish Docker image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: plexdb-merge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
